<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Baby</title>

<style>
body {
  font-family: 'Segoe Script', cursive;
  text-align: center;
  background: linear-gradient(135deg, #fbe7e7, #f7c6c7);
  color: #5a2a2a;
  padding: 40px;
  overflow-x: hidden;
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  background: #b76e79;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 15px;
}

.hidden { display: none; }

textarea {
  width:70%;
  padding:10px;
  border-radius:10px;
  border: none;
}

/* POPUP */
#popup {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  z-index:1000;
}

/* GIFT */
#giftBoxImg {
  width:200px;
  cursor:pointer;
  animation: float 1.5s infinite alternate ease-in-out;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-15px); }
}

/* BALLOONS */
.balloon {
  position: fixed;
  bottom: -100px;
  width: 35px;
  height: 50px;
  border-radius: 50%;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

/* CONFETTI */
.confetti {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  animation: fall 4s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(0); }
  100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<h1>Happy Birthday Baby 🎂</h1>

<button id="startBtn" onclick="startQuiz()">Start 💌</button>

<!-- QUIZ -->
<div id="quiz" class="hidden">

  <div id="q1">
    <p>What is your favourite moment of us?</p>
    <textarea></textarea><br>
    <button onclick="showPopup(1)">Next</button>
  </div>

  <div id="q2" class="hidden">
    <p>What are you grateful for in this 24 years of life?</p>
    <textarea></textarea><br>
    <button onclick="showPopup(2)">Next</button>
  </div>

  <div id="q3" class="hidden">
    <p>What are you looking forward in your coming years?</p>
    <textarea></textarea><br>
    <button onclick="showPopup(3)">Finish</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden">
  <p id="popupText"></p>
  <button onclick="nextStep()">Continue 💖</button>
</div>

<!-- GIFT -->
<div id="gift" class="hidden">
  <img id="giftBoxImg" src="giftbox.png" onclick="openGift()">
</div>

<!-- FINAL -->
<div id="final" class="hidden">
  <img src="catgift.jpg" style="width:280px;border-radius:20px;">
  <br>
  <button onclick="showFinal()">For Sethu 💌</button>
</div>

<div id="finalMsg" class="hidden">
  <p style="margin-top:20px;font-size:18px;">
    Happy Birthday Baby 💖<br><br>
    I love you so much. You're my safe place, my peace, my everything.
  </p>
</div>

<script>

let current = 0;

const messages = {
  1: "Omg same baby! Appo ithu love eh thaane Jessie?",
  2: "Awww you're still mah lil baby and you're a walking blessing for everyone in your life",
  3: "I wish you the best for coming years baby. I'm not going anywhere, my love"
};

function startQuiz(){
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("quiz").classList.remove("hidden");
}

/* SHOW POPUP */
function showPopup(step){
  current = step;
  document.getElementById("popupText").innerText = messages[step];
  document.getElementById("popup").classList.remove("hidden");
}

/* MOVE NEXT */
function nextStep(){
  document.getElementById("popup").classList.add("hidden");

  document.getElementById("q"+current).classList.add("hidden");

  if(current < 3){
    document.getElementById("q"+(current+1)).classList.remove("hidden");
  } else {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("gift").classList.remove("hidden");
  }
}

/* GIFT OPEN */
function openGift(){
  document.getElementById("gift").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");
  startCelebration();
}

/* FINAL MESSAGE */
function showFinal(){
  document.getElementById("finalMsg").classList.remove("hidden");
}

/* CELEBRATION */
function startCelebration(){

  // balloons
  for(let i=0;i<12;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = ["#ff6b6b","#ffb6b9","#ffd166","#b76e79"][Math.floor(Math.random()*4)];
    document.body.appendChild(b);
  }

  // confetti
  for(let i=0;i<50;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["#fff","#ffd166","#ff6b6b","#b76e79"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),5000);
  }
}

</script>

</body>
</html>
