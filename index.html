<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Quiz 💖</title>

<style>
body {
  font-family: cursive;
  text-align: center;
  background: linear-gradient(135deg, #ffe3e3, #ffc6c6);
  padding: 40px;
  overflow-x: hidden;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: #b76e79;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.hidden { display: none; }

textarea {
  width: 70%;
  padding: 10px;
  border-radius: 10px;
}

/* popup */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  z-index: 10;
}

/* gift */
#giftBox {
  width: 180px;
  cursor: pointer;
  animation: float 1.5s infinite alternate;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-12px); }
}

/* celebration */
.balloon, .confetti {
  position: fixed;
  pointer-events: none;
}

.balloon {
  bottom: -100px;
  width: 30px;
  height: 45px;
  border-radius: 50%;
  animation: rise 6s linear forwards;
}

@keyframes rise {
  to { transform: translateY(-120vh); }
}

.confetti {
  top: -10px;
  width: 8px;
  height: 8px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  to { transform: translateY(120vh); }
}
</style>
</head>

<body>

<h1>Happy Birthday Baby 🎂</h1>

<button id="startBtn" onclick="startQuiz()">Start 💌</button>

<!-- QUIZ -->
<div id="quiz" class="hidden">

  <div class="q" id="q1">
    <p>What is your favourite moment of us?</p>
    <textarea></textarea><br>
    <button onclick="next(1)">Next</button>
  </div>

  <div class="q hidden" id="q2">
    <p>What are you grateful for in this 24 years of life?</p>
    <textarea></textarea><br>
    <button onclick="next(2)">Next</button>
  </div>

  <div class="q hidden" id="q3">
    <p>What are you looking forward in your coming years?</p>
    <textarea></textarea><br>
    <button onclick="finish()">Finish</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden">
  <p id="popupText"></p>
  <button onclick="closePopup()">Continue 💖</button>
</div>

<!-- GIFT -->
<div id="gift" class="hidden">
  <img id="giftBox" src="giftbox.png" onclick="openGift()">
</div>

<!-- FINAL -->
<div id="final" class="hidden">
  <img src="catgift.jpg" style="width:250px;border-radius:20px;">
  <p>For Sethu 💌</p>
  <button onclick="showFinal()">Open Message</button>
</div>

<div id="finalMsg" class="hidden">
  <h3>I love you baby 💖</h3>
</div>

<script>

let step = 1;

const messages = {
  1: "Omg same baby! Appo ithu love eh thaane Jessie?",
  2: "Awww you're still my lil baby and a blessing 💖",
  3: "I’ll always be there for you, no matter what 💌"
};

function startQuiz(){
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("quiz").classList.remove("hidden");
}

/* NEXT QUESTION + POPUP */
function next(n){
  step = n;

  document.getElementById("popupText").innerText = messages[n];
  document.getElementById("popup").classList.remove("hidden");

  document.getElementById("q"+n).classList.add("hidden");
}

/* CLOSE POPUP + GO NEXT */
function closePopup(){

  document.getElementById("popup").classList.add("hidden");

  if(step < 3){
    document.getElementById("q"+(step+1)).classList.remove("hidden");
  } else {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("gift").classList.remove("hidden");
  }
}

/* GIFT OPEN */
function openGift(){
  document.getElementById("gift").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");
  celebration();
}

/* FINAL */
function showFinal(){
  document.getElementById("finalMsg").classList.remove("hidden");
}

/* CELEBRATION */
function celebration(){

  for(let i=0;i<15;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = ["#ff6b6b","#ffb6b9","#ffd166","#b76e79"][Math.floor(Math.random()*4)];
    document.body.appendChild(b);
  }

  for(let i=0;i<60;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["#fff","#ff6b6b","#ffd166","#b76e79"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),5000);
  }
}

</script>

</body>
</html>

</script>

</body>
</html>
