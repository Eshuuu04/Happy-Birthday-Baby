<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Baby</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Dancing Script', cursive;
  text-align: center;
  background: linear-gradient(135deg, #fbe7e7, #f7c6c7);
  color: #5a2a2a;
  padding: 40px;
  position: relative;
  overflow-x: hidden;
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  background: #b76e79;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 15px;
}

.hidden { display: none; }

textarea {
  width:70%;
  padding:10px;
  border-radius:10px;
}

/* popup */
#popup {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  z-index:1000;
}

/* gift */
#giftBoxImg {
  width:200px;
  cursor:pointer;
  margin-top:20px;
  animation: float 1.5s infinite alternate ease-in-out;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(-15px); }
}

/* balloons */
.balloon {
  position: fixed;
  bottom: -100px;
  width: 30px;
  height: 40px;
  border-radius: 50%;
  animation: floatUp 6s linear forwards;
  z-index: 9999;
}

@keyframes floatUp {
  to { transform: translateY(-120vh); }
}

/* confetti */
.confetti {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  animation: fall 4s linear forwards;
  z-index: 9999;
}

@keyframes fall {
  to { transform: translateY(120vh) rotate(360deg); }
}
</style>
</head>

<body>

<h1>Happy Birthday Baby 🎂</h1>

<button id="startBtn" onclick="startQuiz()">Start 💌</button>

<div id="quiz" class="hidden">

  <div id="q1">
    <p>What is your favourite moment of us?</p>
    <textarea></textarea><br>
    <button onclick="showMessage(1)">Next</button>
  </div>

  <div id="q2" class="hidden">
    <p>What are you grateful for in this 24 years of life?</p>
    <textarea></textarea><br>
    <button onclick="showMessage(2)">Next</button>
  </div>

  <div id="q3" class="hidden">
    <p>What are you looking forward in your coming years?</p>
    <textarea></textarea><br>
    <button onclick="showMessage(3)">Next</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden">
  <p id="popupText"></p>
  <button onclick="nextStep()">Continue 💖</button>
</div>

<!-- GIFT -->
<div id="gift" class="hidden">
  <img id="giftBoxImg" src="giftbox.png" onclick="openGift()">
</div>

<!-- FINAL -->
<div id="final" class="hidden">
  <img src="catgift.jpg" style="width:280px;border-radius:20px;">
  <br>
  <button onclick="showFinal()">For Sethu 💌</button>
</div>

<div id="finalMsg" class="hidden">
  <p style="margin-top:20px;font-size:18px;">
    Happy Birthday Baby 💖<br><br>
    I love you so much. Thank you for being in my life, for loving me, for choosing me.
  </p>
</div>

<script>

let current = 0;

const messages = {
  1: "Omg same baby! Appo ithu love eh thaane Jessie?",
  2: "Awww you're still mah lil baby and you're a walking blessing for everyone in your life",
  3: "I wish you the best for coming years baby, I'm not going anywhere, my love"
};

function startQuiz(){
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("quiz").classList.remove("hidden");
}

function showMessage(step){
  current = step;
  document.getElementById("popupText").innerText = messages[step];
  document.getElementById("popup").classList.remove("hidden");
}

function nextStep(){
  document.getElementById("popup").classList.add("hidden");

  document.getElementById("q"+current).classList.add("hidden");

  if(current < 3){
    document.getElementById("q"+(current+1)).classList.remove("hidden");
  } else {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("gift").classList.remove("hidden");
  }
}

function openGift(){
  document.getElementById("gift").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");
  startCelebration();
}

function showFinal(){
  document.getElementById("finalMsg").classList.remove("hidden");
}

/* 🎉 CONFETTI + BALLOONS FIXED */
function startCelebration(){

  // BALLOONS
  for(let i=0;i<10;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = ["#ff6b6b","#ffb6b9","#b76e79"][Math.floor(Math.random()*3)];
    document.body.appendChild(b);

    setTimeout(()=>b.remove(),6000);
  }

  // CONFETTI
  for(let i=0;i<60;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["#fff","#ffd166","#ff6b6b","#b76e79"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),4000);
  }
}

</script>

</body>
</html>
